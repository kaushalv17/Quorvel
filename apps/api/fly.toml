app = "belay-cloud-api"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  BELAY_QUEUE_NAME = "belay-events"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"
